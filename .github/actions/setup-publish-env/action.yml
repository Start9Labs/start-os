name: "Setup Publish Environment"
description: |
  Minimal environment for the Publish job: installs start-cli only.

  The Publish job doesn't build s9pks, so it doesn't need Node, Rust,
  Docker, Buildx, QEMU, or the squashfs toolchain that setup-build-env
  installs. It needs:
    - start-cli (statically linked; we install it here)
    - jq (pre-installed on ubuntu-latest)
    - curl (pre-installed on ubuntu-latest)
    - s3cmd (installed conditionally by the Publish job's "Configure S3"
      step when S3_S9PKS_BASE_URL is set; start-cli s9pk publish shells
      out to s3cmd)
runs:
  using: "composite"
  steps:
    - name: Install start-cli
      run: |
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ASSET_NAME="start-cli_${ARCH}-${OS}"
        DOWNLOAD_URL=$(curl -fsS \
          -H "Authorization: token ${{ github.token }}" \
          https://api.github.com/repos/Start9Labs/start-os/releases \
          | jq -r '[.[].assets[] | select(.name=="'"$ASSET_NAME"'")] | first | .browser_download_url')
        if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
          echo "Error: Could not find asset '$ASSET_NAME' in Start9Labs/start-os releases"
          exit 1
        fi
        curl -fsSL \
          -H "Authorization: token ${{ github.token }}" \
          -H "Accept: application/octet-stream" \
          "$DOWNLOAD_URL" -o /tmp/start-cli
        sudo install -m 755 /tmp/start-cli /usr/local/bin/start-cli
        rm /tmp/start-cli
        echo ""
        echo "start-cli: $(start-cli --version)"
      shell: bash
