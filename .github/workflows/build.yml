name: Build

on:
  workflow_call:
    inputs:
      FREE_DISK_SPACE:
        description: "Free up disk space before building"
        type: boolean
        default: false
    secrets:
      DEV_KEY:
        description: "Developer signing key"
        required: false

jobs:
  # Read the package's build matrix by running `make -s print-TARGETS`.
  # Mirrors release.yml: each package's Makefile declares `TARGETS` as the
  # list of leaf make-targets to build in parallel (defaults to $(ARCHES)).
  #
  # If the package's s9pk.mk hasn't been synced yet (no `print-%` rule),
  # `make print-TARGETS` fails and we fall back to a single-entry matrix
  # that runs plain `make` on one runner — same as the legacy single-job build.
  DiscoverMatrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout services repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Discover build matrix
        id: discover
        run: |
          if TARGETS=$(make -s print-TARGETS 2>/dev/null) && [ -n "$TARGETS" ]; then
            # Space-separated list of make-target names -> JSON array of strings.
            MATRIX=$(printf '%s\n' $TARGETS | jq -Rc 'select(length>0)' | jq -sc '.')
            echo "Discovered build matrix: $MATRIX"
          else
            echo "::warning::Package has no 'print-TARGETS' (s9pk.mk not yet synced); falling back to a single-entry matrix (one runner builds everything)."
            MATRIX='[""]'
          fi
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
        shell: bash

  # Fan out: one runner per make-target. arm targets build natively on
  # GitHub's arm64 runner — both the bare arch (`arm`) and per-variant leaves
  # (`<variant>-arm`). x86 and riscv stay on x86 (riscv still emulates under
  # QEMU). Empty target (fallback path) -> x86.
  BuildMatrix:
    needs: DiscoverMatrix
    runs-on: ${{ (matrix.target == 'arm' || matrix.target == 'arm64' || matrix.target == 'aarch64' || endsWith(matrix.target, '-arm') || endsWith(matrix.target, '-arm64') || endsWith(matrix.target, '-aarch64')) && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.DiscoverMatrix.outputs.matrix) }}
    steps:
      - name: Free up disk space
        if: ${{ inputs.FREE_DISK_SPACE }}
        uses: Start9Labs/start-os/.github/actions/free-disk-space@master

      - name: Setup build environment
        uses: Start9Labs/start-os/.github/actions/setup-build-env@master

      - name: Checkout services repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Find or create developer signing key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi
        shell: bash

      - name: Build (make ${{ matrix.target || '(default)' }})
        run: |
          RUST_LOG=debug RUST_BACKTRACE=1 make ${{ matrix.target }}
          echo ""
          echo "SHA256SUMs:"
          sha256sum *.s9pk
        shell: bash

      - name: Upload each s9pk as its own artifact
        uses: Start9Labs/start-os/.github/actions/upload-each@master
        with:
          pattern: "*.s9pk"
          retention-days: 14
          compression-level: 0
