name: Build OpenWrt Image

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      runner:
        type: choice
        description: Runner type
        options:
          - fast
          - standard

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODEJS_VERSION: "22"

jobs:
  build:
    name: Build Image
    if: github.event.pull_request.draft != true
    runs-on: >-
      ${{
        fromJson('["buildjet-32vcpu-ubuntu-2204", "ubuntu-latest"]')
        [github.event.inputs.runner == 'standard']
      }}
    steps:
      - name: Mount tmpfs
        if: github.event.inputs.runner != 'standard'
        run: sudo mount -t tmpfs tmpfs .

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.OPENWRT_DEPLOY_KEY }}

      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}
          free-space: ${{ github.event.inputs.runner == 'standard' && 'true' || 'false' }}

      - name: Cache OpenWrt download directory
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ hashFiles('build/feeds.conf', 'build/openwrt.diffconfig') }}
          restore-keys: openwrt-dl-

      - name: Setup OpenWrt (feeds, config, download)
        run: make openwrt-setup

      - name: Build image
        run: make image
        env:
          SCCACHE_GHA_ENABLED: on
          SCCACHE_GHA_VERSION: 0

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-image
          path: out/*.img
          retention-days: 7
