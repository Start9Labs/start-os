name: Build OpenWrt Image

on:
  # Restore these triggers once the repo is public — private-repo CI minutes
  # were burning through the org quota at ~5h per build.
  # pull_request:
  #   branches: [master]
  #   paths-ignore:
  #     - "**/*.md"
  push:
    # branches: [master]
    tags: ["v*"]
    # paths-ignore:
    #   - "**/*.md"
  workflow_dispatch:
    inputs:
      deploy:
        type: choice
        description: Deploy
        options:
          - NONE
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODEJS_VERSION: "22"

jobs:
  build:
    name: Build Image
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.OPENWRT_DEPLOY_KEY }}

      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}

      - name: Cache OpenWrt download directory
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ hashFiles('build/feeds.conf', 'build/openwrt.diffconfig') }}
          restore-keys: openwrt-dl-

      - name: Setup OpenWrt (feeds, config, download)
        run: make openwrt-setup

      - name: Build image
        run: make image
        env:
          SCCACHE_GHA_ENABLED: on
          SCCACHE_GHA_VERSION: 0

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-image
          path: out/*.img
          retention-days: 7

  release:
    name: Release
    needs: [build]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: web/package.json

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' web/package.json | head -1)
            TAG="v$VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: openwrt-image
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*.img
          fail_on_unmatched_files: true
          generate_release_notes: true
