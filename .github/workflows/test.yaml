name: Automated Tests

on:
  push:
    branches:
      - master
      - next/*
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - master
      - next/*
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODEJS_VERSION: "24.17.0"
  ENVIRONMENT: dev-unstable

jobs:
  test:
    name: Run Automated Tests
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}
          free-space: "false"
          setup-docker: "false"
          setup-sccache: "false"

      - name: Build And Run Tests
        run: make test

  format:
    name: Formatting & Lockfiles
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}
          free-space: "false"
          setup-docker: "false"
          setup-sccache: "false"
      # `npm ci` fails if a lockfile is out of sync with its package.json, unlike the
      # build's `npm i` which silently rewrites it. This is the lockfile-drift gate.
      # web and the SDK both resolve start-core via file:shared-libs/ts-modules/start-core/dist,
      # so it must exist before their npm ci.
      - name: Build start-core
        run: cd shared-libs/ts-modules/start-core && make dist
      - name: Validate SDK lockfiles
        run: |
          npm --prefix shared-libs/ts-modules/start-core ci
          npm --prefix projects/start-sdk ci
      - name: Validate web lockfile
        run: npm ci
      - name: Check formatting
        run: |
          npm run format:check
          cd shared-libs/ts-modules/start-core && npx prettier "**/*.ts" --check
          cd "$GITHUB_WORKSPACE/projects/start-sdk" && npx prettier "**/*.ts" --check
