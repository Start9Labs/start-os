name: Automated Tests

on:
  push:
    branches:
      - master
      - next/*
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - master
      - next/*
    paths-ignore:
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODEJS_VERSION: "24.17.0"
  ENVIRONMENT: dev-unstable

jobs:
  test:
    name: Run Automated Tests
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}
          free-space: "false"
          setup-docker: "false"
          setup-sccache: "false"

      - name: Build And Run Tests
        run: make test

  format:
    name: Formatting & Lockfiles
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-build
        with:
          nodejs-version: ${{ env.NODEJS_VERSION }}
          free-space: "false"
          setup-docker: "false"
          setup-sccache: "false"
      # `npm ci` fails if a lockfile is out of sync with its package.json, unlike the
      # build's `npm i` which silently rewrites it. This is the lockfile-drift gate.
      - name: Validate SDK lockfiles
        run: |
          npm --prefix sdk/base ci
          npm --prefix sdk/package ci
      # web resolves the SDK via file:../sdk/baseDist, so baseDist must exist for web's npm ci.
      - name: Build SDK (baseDist)
        run: cd sdk && make baseDist
      - name: Validate web lockfile
        run: npm --prefix web ci
      - name: Check formatting
        run: |
          npm --prefix web run format:check
          cd sdk && npx --prefix base prettier "**/*.ts" --check
