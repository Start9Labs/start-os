name: Deploy brochure (marketplace.start9.com)

# Builds projects/brochure and deploys it to marketplace.start9.com on the
# shared VPS (same box as start9.com and docs.start9.com), mirroring those
# repos' deploy.yml. Triggers only when brochure's build inputs change.

on:
  push:
    branches: ["master"]
    paths:
      - "projects/brochure-marketplace/**"
      - "shared-libs/ts-modules/shared/**"
      - "shared-libs/ts-modules/marketplace/**"
      - "angular.json"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.lib.json"
      - "projects/start-sdk/**"
      - "shared-libs/crates/patch-db"
      - ".github/workflows/deploy-brochure.yml"
      # Doc-only edits under the allowlisted paths (e.g. sdk/**) shouldn't redeploy.
      - "!**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy-brochure"
  cancel-in-progress: false

env:
  NODEJS_VERSION: "24.17.0"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      # web resolves the SDK via file:../projects/start-sdk/baseDist, so baseDist must exist
      # before web's `npm ci` and the brochure build.
      - name: Build SDK (baseDist)
        run: |
          npm --prefix projects/start-sdk/base ci
          cd start-sdk && make baseDist

      # brochure transitively bundles patch-db-client (file:../shared-libs/crates/patch-db/client),
      # so its dist must be built too.
      - name: Build patch-db client
        run: |
          npm --prefix shared-libs/crates/patch-db/client ci
          npm --prefix shared-libs/crates/patch-db/client run build

      - name: Install web dependencies
        run: npm ci

      - name: Build brochure
        run: |
          npm run build:brochure
          test -f projects/brochure-marketplace/dist/raw/brochure-marketplace/index.html

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WEBSITE_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H start9.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host marketplace-vps
            HostName start9.com
            User root
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
          EOF

      - name: Deploy to VPS
        run: rsync -az --delete projects/brochure-marketplace/dist/raw/brochure-marketplace/ marketplace-vps:/var/www/html/marketplace.start9.com/
