# Raspberry Pi-specific GRUB overrides
# Overrides GRUB_CMDLINE_LINUX from /etc/default/grub with Pi-specific
# console devices and hardware quirks.
#
# console=tty0 (HDMI VT via efifb) is primary so failures are visible on
# the monitor. earlycon prints early boot to the ACPI-described serial
# (SPCR) for a TTL adapter on GPIO 14/15 @115200. We do NOT use
# console=serial0: that's a device-tree alias, and we boot under EDK2's
# ACPI handoff (generic arm64 kernel, no DT) where it can't resolve —
# which is exactly why the screen was silent before.
GRUB_CMDLINE_LINUX="boot=startos console=tty0 earlycon usb-storage.quirks=152d:0562:u,14cd:121c:u,0781:cfcb:u cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory"
