# Raspberry Pi-specific GRUB overrides
# Overrides GRUB_CMDLINE_LINUX from /etc/default/grub with Pi-specific
# console devices and hardware quirks.
#
# earlycon: print kernel boot to the UART (DT-described, enable_uart=1 in
# config.txt) from the earliest point, so a hang between GRUB and userland
# is visible on a serial adapter (GPIO 14/15 @115200) instead of a silent
# freeze. console=tty1 keeps the HDMI VT console; console=serial0 resolves
# via the device tree U-Boot hands the kernel.
GRUB_CMDLINE_LINUX="boot=startos earlycon console=serial0,115200 console=tty1 usb-storage.quirks=152d:0562:u,14cd:121c:u,0781:cfcb:u cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory"
